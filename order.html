<form action="https://formspree.io/f/mykqleae" method="POST">
  <label>Your Name</label>
  <input type="text" name="name" required>

  <label>Email</label>
  <input type="email" name="email" required>

  <label>Business Name</label>
  <input type="text" name="business">

  <label>What kind of website do you want?</label>
  <select name="website_type">
    <option>Business Website</option>
    <option>E-commerce Store</option>
    <option>Portfolio</option>
    <option>Blog</option>
    <option>Landing Page</option>
  </select>

  <label>Describe your website</label>
  <textarea name="description" rows="8" required></textarea>

  <label>Pages Needed</label>
  <input type="text" name="pages">

  <label>Preferred Colors</label>
  <input type="text" name="colors">

  <label>Budget</label>
  <input type="text" name="budget">

  <label>Deadline</label>
  <input type="date" name="deadline">

  <button type="submit">Submit Order</button>
</form>
