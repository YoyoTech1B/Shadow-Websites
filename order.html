<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Websites</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:linear-gradient(135deg,#667eea,#764ba2);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.container{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.2);
    width:100%;
    max-width:750px;
    padding:45px;
    border-radius:30px;
  animation: floatCard 5s ease-in-out infinite;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}
h1{
  text-align:center;
  margin-bottom:10px;
  color:#333;
}

p{
  text-align:center;
  color:#777;
  margin-bottom:30px;
}

.form-group{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:bold;
  color:#333;
}

input,
select,
textarea{
  width:100%;
  padding:14px;
  border:1px solid #ddd;
  border-radius:10px;
  font-size:16px;
}

textarea{
  min-height:150px;
  resize:vertical;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

button{
  width:100%;
  padding:16px;
  border:none;
  background:#667eea;
  color:white;
  font-size:18px;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#5a67d8;
  transform:translateY(-2px);
}

@media(max-width:700px){
  .row{
    grid-template-columns:1fr;
  }

  .container{
    padding:25px;
  }
}
@keyframes floatCard{
    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
  <h1>Website Order Form</h1>
  <p>Tell me about the website you want and I'll get back to you.</p>

  <form action="https://formspree.io/f/mykqleae" method="POST">

    <div class="row">
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" name="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Business Name</label>
        <input type="text" name="business">
      </div>

      <div class="form-group">
        <label>Website Type</label>
        <select name="website_type">
          <option>Business Website</option>
          <option>E-commerce Store</option>
          <option>Portfolio</option>
          <option>Blog</option>
          <option>Landing Page</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Describe your website</label>
      <textarea name="description" required></textarea>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Pages Needed</label>
        <input type="text" name="pages">
      </div>

      <div class="form-group">
        <label>Preferred Colors</label>
        <input type="text" name="colors">
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Budget</label>
        <input type="text" name="budget">
      </div>

      <div class="form-group">
        <label>Deadline</label>
        <input type="date" name="deadline">
      </div>
    </div>

    <button type="submit">🚀 Submit Order</button>

  </form>
</div>

</body>
</html>
