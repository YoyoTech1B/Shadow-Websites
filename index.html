<!DOCTYPE html>
<html>
<head>
  <title>Website Orders</title>
  <meta charset="UTF-8">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: auto;
      padding: 20px;
      background: #f5f5f5;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #333;
    }

    a.button {
      display: inline-block;
      background: #007bff;
      color: white;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 5px;
      margin-top: 20px;
    }

    a.button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Need a Website?</h1>
    <p>
      Tell me about your project and I'll build the website you want.
    </p>

    <h3>What I can build:</h3>
    <ul>
      <li>Business websites</li>
      <li>E-commerce stores</li>
      <li>Portfolios</li>
      <li>Blogs</li>
      <li>Landing pages</li>
    </ul>

    <a class="button" href="order.html">Order a Website</a>
  </div>
</body>
</html>
